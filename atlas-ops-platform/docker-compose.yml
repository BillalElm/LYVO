version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: atlasops_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlasops
      POSTGRES_USER: atlasops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlasops_secure_pass}
    volumes:
      - atlasops_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"      # port 5433 pour éviter le conflit avec lyvo (5432)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlasops"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlasops_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://atlasops:${POSTGRES_PASSWORD:-atlasops_secure_pass}@db:5432/atlasops
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://atlasops.fr}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-ATLAS OPS <contact@atlasops.fr>}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://atlasops.fr}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: atlasops_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # certificats SSL (Let's Encrypt)
      - nginx_logs:/var/log/nginx

volumes:
  atlasops_pgdata:
  nginx_logs:
